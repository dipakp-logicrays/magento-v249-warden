date.timezone = UTC
max_execution_time=18000
max_input_time=1800
max_input_vars = 10000
memory_limit = 4G
display_errors = On
post_max_size = 25M
# session.auto_start = Off
upload_max_filesize = 25M

; Configure sendmail to use mhsendmail pointing to Mailpit SMTP
sendmail_path = "/usr/local/bin/mhsendmail --smtp-addr=mailpit:1025"

; Realpath cache for faster file resolution
realpath_cache_size=10M
realpath_cache_ttl=7200

; OPcache optimizations (development mode)
; opcache.enable=1
; opcache.enable_cli=1
; opcache.memory_consumption=512
; opcache.interned_strings_buffer=64
; opcache.max_accelerated_files=130987
; opcache.validate_timestamps=1
; opcache.revalidate_freq=0
; opcache.save_comments=1
; opcache.fast_shutdown=1