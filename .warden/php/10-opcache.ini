; Overrides /etc/php.d/10-opcache.ini in the Warden PHP container.
; The default file references opcache.so, but the PHP 8.5 image does not
; ship the extension at /usr/lib64/php/modules/opcache.so, which produces
; a "Failed loading Zend extension 'opcache.so'" warning on every PHP
; invocation. We intentionally do not load the extension and explicitly
; disable opcache so behaviour is consistent for FPM and CLI.

opcache.enable = 0
opcache.enable_cli = 0
